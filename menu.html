<style>
:root{
  --gold1:#cfae70;
  --gold2:#f5d48a;
  --gold3:#9c7a3c;
  --bg:#0b0b0e;
  --card:#141419;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050507 60%);
  color:#eee;
  font-family:system-ui,Segoe UI,Arial;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

.header{
  text-align:center;
  margin-bottom:40px;
}

.header h1{
  margin:0;
  font-size:42px;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  -webkit-background-clip:text;
  color:transparent;
}

.header p{
  opacity:.7;
  margin-top:10px;
}

/* controls */

.controls{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:35px;
}

select{
  background:#111;
  border:1px solid #333;
  color:#ddd;
  padding:10px 14px;
  border-radius:8px;
}

/* grid */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:22px;
}

/* card */

.card{
  background:linear-gradient(180deg,#1a1a20,#0f0f14);
  border:1px solid #2a2a33;
  border-radius:18px;
  padding:22px;
  position:relative;
  overflow:hidden;
  transition:.35s;
}

.card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,215,140,.15),transparent);
  opacity:0;
  transition:.4s;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
  border-color:var(--gold3);
  box-shadow:0 0 30px rgba(212,175,55,.18);
}

.card:hover:before{opacity:1}

.badge{
  position:absolute;
  top:14px;
  right:14px;
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
  font-weight:700;
}

.title{
  font-size:20px;
  margin:0 0 8px;
  color:#fff;
}

.price{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,var(--gold2),#fff1c2);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:12px;
}

.meta{
  opacity:.7;
  font-size:14px;
  margin-bottom:12px;
}

.toggle{
  cursor:pointer;
  font-size:14px;
  color:var(--gold2);
}

.items{
  max-height:0;
  overflow:hidden;
  transition:.35s;
  font-size:14px;
  opacity:.85;
}

.items ul{
  padding-left:18px;
  margin:10px 0 0;
}

.btn{
  margin-top:16px;
  display:inline-block;
  width:100%;
  text-align:center;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  letter-spacing:.5px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
  transition:.25s;
}

.btn:hover{
  filter:brightness(1.1);
  box-shadow:0 0 18px rgba(255,215,120,.5);
}

/* fade in */

.card{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .6s forwards;
}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}
.card:nth-child(5){animation-delay:.2s}

@keyframes fadeUp{
  to{opacity:1; transform:none}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1><i class="fa-solid fa-crown"></i> THE WANN COMBO</h1>
    <p>Premium Combo Packages • Giá chưa gồm VAT & phí phục vụ</p>
  </div>

  <div class="controls">
    <select id="sort">

    </select>

    <select id="filter">

      <option value="mid">7–12 triệu</option>

</div>
