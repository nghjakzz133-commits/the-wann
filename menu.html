<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MENU | THE WANN</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>


<section class="section dark">
  <h2>MENU & DỊCH VỤ</h2>

  <p>
    Menu tại THE WANN bao gồm đa dạng rượu mạnh, champagne,
    cocktail signature và các combo bàn được thiết kế tối ưu cho từng nhóm khách.
  </p>

  <p>
    • Bàn thường – linh hoạt cho nhóm nhỏ<br>
    • Bàn VIP – vị trí đẹp, riêng tư<br>
    • Combo ưu đãi theo sự kiện và ngày đặc biệt
  </p>
</section>

<section class="section dark">
  <h2>MENU HÌNH ẢNH</h2>

  <div class="menu-gallery" id="menuGallery"></div>
  <button class="menu-load" id="loadMore">Xem thêm</button>
</section>

<script>
let current = 0;
const perLoad = 12;
const total = 70;
const gallery = document.getElementById("menuGallery");
const btn = document.getElementById("loadMore");

function loadMenu(){
  for(let i=current+1;i<=current+perLoad && i<=total;i++){
    const img=document.createElement("img");
    img.src=`assets/menu/menu-${String(i).padStart(2,'0')}.jpg`;
    img.loading="lazy";
    gallery.appendChild(img);
  }
  current+=perLoad;
  if(current>=total) btn.style.display="none";
}
btn.onclick=loadMenu;
loadMenu();
</script>

</body>
</html>
