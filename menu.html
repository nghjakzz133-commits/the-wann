<meta charset="UTF-8">
<title>THE WANN – Combo Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --gold1:#cfae70;
  --gold2:#f5d48a;
  --gold3:#9c7a3c;
  --bg:#0b0b0e;
  --card:#141419;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050507 60%);
  color:#eee;
  font-family:system-ui,Segoe UI,Arial;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

.header{
  text-align:center;
  margin-bottom:40px;
}

.header h1{
  margin:0;
  font-size:42px;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  -webkit-background-clip:text;
  color:transparent;
}

.header p{
  opacity:.7;
  margin-top:10px;
}

/* controls */

.controls{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:35px;
}

select{
  background:#111;
  border:1px solid #333;
  color:#ddd;
  padding:10px 14px;
  border-radius:8px;
}

/* grid */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:22px;
}

/* card */

.card{
  background:linear-gradient(180deg,#1a1a20,#0f0f14);
  border:1px solid #2a2a33;
  border-radius:18px;
  padding:22px;
  position:relative;
  overflow:hidden;
  transition:.35s;
}

.card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,215,140,.15),transparent);
  opacity:0;
  transition:.4s;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
  border-color:var(--gold3);
  box-shadow:0 0 30px rgba(212,175,55,.18);
}

.card:hover:before{opacity:1}

.badge{
  position:absolute;
  top:14px;
  right:14px;
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
  font-weight:700;
}

.title{
  font-size:20px;
  margin:0 0 8px;
  color:#fff;
}

.price{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,var(--gold2),#fff1c2);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:12px;
}

.meta{
  opacity:.7;
  font-size:14px;
  margin-bottom:12px;
}

.toggle{
  cursor:pointer;
  font-size:14px;
  color:var(--gold2);
}

.items{
  max-height:0;
  overflow:hidden;
  transition:.35s;
  font-size:14px;
  opacity:.85;
}

.items ul{
  padding-left:18px;
  margin:10px 0 0;
}

.btn{
  margin-top:16px;
  display:inline-block;
  width:100%;
  text-align:center;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  letter-spacing:.5px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
  transition:.25s;
}

.btn:hover{
  filter:brightness(1.1);
  box-shadow:0 0 18px rgba(255,215,120,.5);
}

/* fade in */

.card{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .6s forwards;
}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}
.card:nth-child(5){animation-delay:.2s}

@keyframes fadeUp{
  to{opacity:1; transform:none}
}
</style>
</head>

<body>

    <h1><i class="fa-solid fa-crown"></i> THE WANN COMBO</h1>
    <p>Premium Combo Packages • Giá chưa gồm VAT & phí phục vụ</p>
  </div>

  <div class="controls">
    <select id="sort">
      <option value="asc">Giá thấp → cao</option>
      <option value="desc">Giá cao → thấp</option>
    </select>

    <select id="filter">
      <option value="all">Tất cả mức giá</option>
      <option value="low">Dưới 7 triệu</option>
      <option value="mid">7–12 triệu</option>
      <option value="high">Trên 12 triệu</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

champagne: "fa-champagne-glasses",
food: "fa-utensils",
vip: "fa-crown",
default: "fa-gem"
};
  function detectType(c){

  const text = (c.name + " " + (c.meta||"") + " " + c.items.join(" ")).toLowerCase();

  if(text.includes("heineken") || text.includes("bia")) return "beer";
  if(text.includes("chivas") || text.includes("vsop") || text.includes("gold label") || text.includes("xo")) return "whisky";
  if(text.includes("dom") || text.includes("belaire") || text.includes("champagne") || text.includes("fogoso")) return "champagne";
  if(text.includes("the wann")) return "food";
  if(c.badge && c.badge.includes("VIP")) return "vip";

  return "default";
}

const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = list.map(c=>{
    
    const type = detectType(c);
const icon = iconMap[type] || iconMap.default;

    return `
    <div class="card">

      ${c.badge ? `<div class="badge"><i class="fa-solid fa-crown"></i> ${c.badge}</div>`:""}

      <h3 class="title">
  <i class="fa-solid ${icon}"></i>
  ${c.name}
</h3>

      <div class="price">
        <i class="fa-solid fa-coins"></i>
        ${c.price.toLocaleString()}đ
      </div>

      <div class="meta">
        <i class="fa-solid fa-users"></i>
        ${c.meta}
      </div>

      <div class="toggle">
        <i class="fa-solid fa-utensils"></i>
        Xem món trong combo
      </div>

      <div class="items">
        <ul>
          ${c.items.map(i=>`
            <li>
              <i class="fa-solid fa-check"></i>
              ${i}
            </li>
          `).join("")}
        </ul>
      </div>

      <a class="btn" href="tel:0373453757">
        <i class="fa-solid fa-phone"></i>
        Đặt combo này
      </a>

    </div>
    `;
  }).join("");

  document.querySelectorAll(".toggle").forEach(t=>{
    t.onclick = ()=>{
      const box = t.nextElementSibling;
      box.style.maxHeight = box.style.maxHeight ? null : box.scrollHeight+"px";
    }
  });
}

function apply(){
  let arr=[...combos];

  const s=document.getElementById("sort").value;
  const f=document.getElementById("filter").value;

  if(f==="low") arr=arr.filter(x=>x.price<7000);
  if(f==="mid") arr=arr.filter(x=>x.price>=7000 && x.price<=12000);
  if(f==="high") arr=arr.filter(x=>x.price>12000);

  arr.sort((a,b)=> s==="asc"?a.price-b.price:b.price-a.price);

  render(arr);
}

document.getElementById("sort").onchange=apply;
document.getElementById("filter").onchange=apply;

apply();
