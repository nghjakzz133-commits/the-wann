<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>THE WANN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  font-family: Arial, sans-serif;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  background: rgba(0,0,0,0.6);
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

h1 {
  font-size:60px;
  letter-spacing:6px;
  text-shadow: 0 0 15px red;
}

p {
  margin-top:12px;
  letter-spacing:3px;
  color:#ddd;
}

.btn {
  margin-top:25px;
  padding:12px 28px;
  border:1px solid red;
  color:red;
  text-decoration:none;
  letter-spacing:2px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  background:red;
  color:black;
}

/* ===== POPUP MENU ===== */
.popup {
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box {
  width:90%;
  max-width:900px;
  height:90vh;
  background:black;
  border:2px solid red;
  box-shadow:0 0 25px red;
  position:relative;
}

.popup-box iframe {
  width:100%;
  height:100%;
  border:none;
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  color:red;
  font-size:26px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">
  <div>
    <h1>THE WANN</h1>
    <p>NIGHTLIFE • MUSIC • EXPERIENCE</p>

    <p style="margin-top:18px;font-size:14px;">
      📍 51 Bùi Thị Xuân, Quận 1, TP. Hồ Chí Minh
    </p>

    <div class="btn" onclick="openMenu()">VIEW MENU</div>
  </div>
</div>

<!-- POPUP MENU -->
<div class="popup" id="menuPopup">
  <div class="popup-box">
    <div class="close" onclick="closeMenu()">✕</div>

    <!-- ⚠️ menu.pdf PHẢI TỒN TẠI -->
    <iframe src="menu.pdf"></iframe>
  </div>
</div>

<script>
function openMenu() {
  document.getElementById("menuPopup").style.display = "flex";
}

function closeMenu() {
  document.getElementById("menuPopup").style.display = "none";
}
</script>

</body>
</html>
