<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at center, rgba(255,0,60,0.15), rgba(0,0,0,0.95)),
        url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    .overlay {
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.75),
        rgba(120,0,30,0.6),
        rgba(0,0,0,0.9)
      );
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .wrap {
      max-width: 720px;
    }

    /* ===== TITLE ===== */
    h1 {
      font-size: 72px;
      letter-spacing: 10px;
      animation: glow 2.8s ease-in-out infinite alternate,
                 drop 1.2s ease forwards;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 15px #ff0033, 0 0 40px rgba(255,0,60,.7);
      }
      to {
        text-shadow: 0 0 25px #ff3355, 0 0 70px rgba(255,0,80,.95);
      }
    }

    @keyframes drop {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      margin-top: 16px;
      letter-spacing: 4px;
      font-size: 14px;
      color: #ccc;
      opacity: 0;
      animation: rise 1.2s ease forwards;
      animation-delay: .5s;
    }

    .address {
      margin-top: 26px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #eee;
      opacity: 0;
      animation: rise 1.2s ease forwards;
      animation-delay: .8s;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .buttons {
      margin-top: 36px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: rise 1.2s ease forwards;
      animation-delay: 1.1s;
    }

    .btn {
      padding: 15px 38px;
      border-radius: 50px;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: bold;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #ff0022, #99001a);
      box-shadow: 0 0 25px rgba(255,0,60,.7);
      transition: .3s ease;
    }

    .btn.secondary {
      background: linear-gradient(135deg, #111, #33000a);
      box-shadow: 0 0 20px rgba(255,0,60,.4);
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 45px rgba(255,0,60,1);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      h1 {
        font-size: 44px;
        letter-spacing: 6px;
      }

      .tagline,
      .address {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="wrap">
      <h1>THE WANN</h1>

      <div class="tagline">
        NIGHTLIFE • MUSIC • EXPERIENCE
      </div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <div class="buttons">
        <!-- MAP -->
        <a class="btn" target="_blank"
           href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh">
          OPEN MAP
        </a>

        <!-- GALLERY (ví dụ Instagram) -->
        <a class="btn secondary" target="_blank"
           href="https://instagram.com/">
          VIEW GALLERY
        </a>

        <!-- MENU FILE TRONG WEB -->
        <a class="btn secondary" target="_blank"
           href="menu.pdf">
          VIEW MENU
        </a>
      </div>
    </div>
  </div>
</body>
</html>
