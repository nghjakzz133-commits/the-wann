<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    /* ===== GLOW TITLE ===== */
    h1 {
      font-size: 70px;
      letter-spacing: 8px;
      animation: glow 2.5s ease-in-out infinite alternate,
                 fadeDown 1.2s ease forwards;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #ff0033,
          0 0 20px #ff0033,
          0 0 40px #ff0033;
      }
      to {
        text-shadow:
          0 0 20px #ff3355,
          0 0 40px #ff3355,
          0 0 80px #ff3355;
      }
    }

    /* ===== FADE ANIMATION ===== */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tagline {
      margin-top: 14px;
      letter-spacing: 3px;
      color: #ddd;
      font-size: 14px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.5s;
    }

    .address {
      margin-top: 24px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #eee;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .map-btn {
      display: inline-block;
      margin-top: 26px;
      padding: 14px 32px;
      border-radius: 40px;
      background: linear-gradient(135deg, #ff0033, #ff6600);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: bold;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.1s;
      box-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
      transition: 0.3s ease;
    }

    .map-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(255, 0, 60, 0.9);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
        letter-spacing: 5px;
      }

      .tagline,
      .address {
        font-size: 12px;
      }

      .map-btn {
        padding: 12px 26px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div>
      <h1>THE WANN</h1>

      <div class="tagline">
        NIGHTLIFE • MUSIC • EXPERIENCE
      </div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <a
        href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh"
        target="_blank"
        class="map-btn"
      >
        OPEN MAP
      </a>
    </div>
  </div>
</body>
</html>
