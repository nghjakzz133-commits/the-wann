<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.55);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
      text-align: center;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: rgba(0,0,0,0.7);
      padding: 32px 26px;
      border-radius: 20px;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 5px;
    }

    .tagline {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 3px;
      color: #ddd;
    }

    .address {
      margin-top: 22px;
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    .map {
      margin-top: 20px;
      width: 100%;
      height: 220px;
      border-radius: 14px;
      overflow: hidden;
    }

    .map iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Desktop lớn hơn */
    @media (min-width: 768px) {
      h1 {
        font-size: 60px;
      }

      .box {
        max-width: 520px;
        padding: 44px 50px;
      }

      .map {
        height: 260px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="box">
      <h1>THE WANN</h1>
      <p class="tagline">NIGHTLIFE • MUSIC • EXPERIENCE</p>

      <p class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1<br>
        TP. Hồ Chí Minh, Việt Nam
      </p>

      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=51%20Bui%20Thi%20Xuan%20Quan%201%20Ho%20Chi%20Minh&output=embed"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

</body>
</html>
