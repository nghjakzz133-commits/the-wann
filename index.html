<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255, 0, 0, 0.8),
        0 0 20px rgba(255, 0, 0, 0.6),
        0 0 40px rgba(255, 0, 0, 0.4);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px rgba(255, 0, 0, 0.6),
          0 0 20px rgba(255, 0, 0, 0.4);
      }
      to {
        text-shadow:
          0 0 20px rgba(255, 0, 0, 1),
          0 0 40px rgba(255, 0, 0, 0.8);
      }
    }

    .subtitle {
      margin-top: 12px;
      letter-spacing: 3px;
      color: #ddd;
      font-size: 14px;
    }

    .address {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 1.5px;
      color: #ccc;
    }

    .buttons {
      margin-top: 26px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border: 1px solid #ff2a2a;
      color: #ff2a2a;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      background: rgba(0,0,0,0.6);
    }

    .btn:hover {
      background: #ff2a2a;
      color: black;
      box-shadow: 0 0 20px rgba(255, 42, 42, 0.8);
    }

    /* Mobile tối ưu */
    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }
      .subtitle {
        font-size: 12px;
      }
      .address {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div>
      <h1>THE WANN</h1>

      <div class="subtitle">
        NIGHTLIFE • MUSIC • EXPERIENCE
      </div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <div class="buttons">
        <!-- NÚT GOOGLE MAP -->
        <a
          class="btn"
          href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh"
          target="_blank"
        >
          GOOGLE MAP
        </a>

        <!-- NÚT MENU -->
        <a
          class="btn"
          href="menu.pdf"
          target="_blank"
        >
          VIEW MENU
        </a>
      </div>
    </div>
  </div>
</body>
</html>
