<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at center, rgba(255,0,60,0.15), rgba(0,0,0,0.95)),
        url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    .overlay {
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.7),
        rgba(120,0,30,0.6),
        rgba(0,0,0,0.85)
      );
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .wrap {
      max-width: 700px;
    }

    /* ===== TITLE ===== */
    h1 {
      font-size: 72px;
      letter-spacing: 10px;
      animation: glowRed 2.8s ease-in-out infinite alternate,
                 fadeDown 1.2s ease forwards;
    }

    @keyframes glowRed {
      from {
        text-shadow:
          0 0 10px #ff0033,
          0 0 30px rgba(255, 0, 60, 0.7);
      }
      to {
        text-shadow:
          0 0 20px #ff3355,
          0 0 60px rgba(255, 0, 80, 0.95);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tagline {
      margin-top: 16px;
      letter-spacing: 4px;
      font-size: 14px;
      color: #ccc;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.5s;
    }

    .address {
      margin-top: 26px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #eee;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== BUTTON ===== */
    .map-btn {
      display: inline-block;
      margin-top: 32px;
      padding: 16px 42px;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff0022, #99001a);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 3px;
      font-weight: bold;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.1s;
      box-shadow:
        0 0 20px rgba(255, 0, 60, 0.6),
        inset 0 0 10px rgba(255, 255, 255, 0.15);
      transition: 0.3s ease;
    }

    .map-btn:hover {
      transform: scale(1.1);
      box-shadow:
        0 0 40px rgba(255, 0, 60, 0.95),
        inset 0 0 15px rgba(255, 255, 255, 0.25);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      h1 {
        font-size: 44px;
        letter-spacing: 6px;
      }

      .tagline,
      .address {
        font-size: 12px;
      }

      .map-btn {
        padding: 14px 30px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="wrap">
      <h1>THE WANN</h1>

      <div class="tagline">
        NIGHTLIFE • MUSIC • EXPERIENCE
      </div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <a
        href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh"
        target="_blank"
        class="map-btn"
      >
        OPEN MAP
      </a>
    </div>
  </div>
</body>
</html>
