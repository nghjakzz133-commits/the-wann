<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE WANN | Nightclub & Bar Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="THE WANN – Nightclub & Bar. Luxury nightlife experience. Book table via WhatsApp & Zalo." />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LANGUAGE SWITCH -->
  <div class="lang-switch">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('vi')">VN</button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1 id="title">THE WANN</h1>
      <p id="subtitle">Luxury Nightclub & Bar Experience</p>

      <div class="cta">
        <a id="bookBtn" href="#" class="btn-red">BOOK NOW</a>
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section class="services">
    <h2 id="servicesTitle">OUR SERVICES</h2>

    <div class="service-list">
      <div class="service">
        <h3 id="s1">Nightclub</h3>
        <p id="s1d">High-energy music, premium sound & lighting.</p>
      </div>

      <div class="service">
        <h3 id="s2">Bar & Lounge</h3>
        <p id="s2d">Signature cocktails & luxury seating.</p>
      </div>

      <div class="service">
        <h3 id="s3">Table Booking</h3>
        <p id="s3d">VIP tables & private areas.</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© THE WANN Nightlife</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
