<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.65);
      padding: 40px 50px;
      border-radius: 18px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 6px;
    }

    .tagline {
      margin-top: 12px;
      letter-spacing: 3px;
      color: #ddd;
    }

    .address {
      margin-top: 22px;
      font-size: 15px;
      letter-spacing: 1.5px;
      color: #fff;
    }

    .map {
      margin-top: 20px;
      width: 320px;
      height: 220px;
      border-radius: 14px;
      overflow: hidden;
    }

    .map iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 40px;
      }

      .box {
        padding: 30px 20px;
      }

      .map {
        width: 260px;
        height: 180px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="box">
      <h1>THE WANN</h1>
      <p class="tagline">NIGHTLIFE • MUSIC • EXPERIENCE</p>

      <p class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </p>

      <div class="map">
        <iframe
          src="https://www.google.com/maps?q=51%20Bui%20Thi%20Xuan%20Quan%201%20Ho%20Chi%20Minh&output=embed"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

</body>
</html>
