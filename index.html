<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 6px;
      text-shadow:
        0 0 10px #ff0033,
        0 0 20px #ff0033,
        0 0 40px #ff0033;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #ff0033,
          0 0 20px #ff0033;
      }
      to {
        text-shadow:
          0 0 20px #ff3355,
          0 0 40px #ff3355,
          0 0 60px #ff3355;
      }
    }

    .tagline {
      margin-top: 12px;
      letter-spacing: 3px;
      color: #ddd;
      font-size: 14px;
    }

    .address {
      margin-top: 22px;
      font-size: 13px;
      letter-spacing: 1.5px;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 28px;
      border: 1px solid #ff0033;
      color: #ff0033;
      text-decoration: none;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff0033;
      color: black;
      box-shadow: 0 0 20px #ff0033;
    }

    /* Mobile */
    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }

      .tagline {
        font-size: 12px;
      }

      .address {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div>
      <h1>THE WANN</h1>

      <div class="tagline">
        NIGHTLIFE • MUSIC • EXPERIENCE
      </div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <!-- Sau này thay link menu vào đây -->
      <a class="btn" href="#" target="_blank">
        VIEW MENU
      </a>
    </div>
  </div>
</body>
</html>
