<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>THE WANN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.5);
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
    }

    .tagline {
      margin-top: 12px;
      letter-spacing: 3px;
      color: #ddd;
      font-size: 14px;
    }

    .address {
      margin-top: 22px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #eee;
    }

    .map-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 30px;
      border-radius: 30px;
      background: #e10600;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .map-btn:hover {
      background: #ff1e1e;
      transform: scale(1.05);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
      }

      .tagline {
        font-size: 12px;
      }

      .address {
        font-size: 12px;
      }

      .map-btn {
        padding: 12px 24px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div>
      <h1>THE WANN</h1>
      <div class="tagline">NIGHTLIFE • MUSIC • EXPERIENCE</div>

      <div class="address">
        📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
      </div>

      <a
        href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh"
        target="_blank"
        class="map-btn"
      >
        OPEN MAP
      </a>
    </div>
  </div>
</body>
</html>
