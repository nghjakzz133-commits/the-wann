<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>THE WANN | Nightlife • Music • Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ===== BACKGROUND ===== */
body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
}

/* ===== OVERLAY ===== */
.overlay {
  background: rgba(0,0,0,0.65);
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  padding: 20px;
}

/* ===== CONTENT ===== */
.content {
  animation: fadeIn 1.2s ease forwards;
}

/* ===== TITLE ===== */
h1 {
  font-size: 60px;
  letter-spacing: 6px;
  color: #fff;
  text-shadow: 0 0 15px red, 0 0 40px red;
  animation: glow 2s infinite alternate;
}

/* Glow */
@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to   { text-shadow: 0 0 35px red; }
}

/* Fade */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ===== TEXT ===== */
.subtitle {
  margin-top: 12px;
  letter-spacing: 3px;
  color: #ddd;
  animation: slideUp 1s ease forwards;
  animation-delay: 0.3s;
  opacity: 0;
}

.address {
  margin-top: 18px;
  font-size: 14px;
  letter-spacing: 1.5px;
  opacity: 0;
  animation: slideUp 1s ease forwards;
  animation-delay: 0.6s;
}

/* Slide */
@keyframes slideUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ===== BUTTONS ===== */
.buttons {
  margin-top: 30px;
  display: flex;
  justify-content: center;
}

.btn {
  padding: 12px 28px;
  border: 1px solid red;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  font-size: 13px;
  transition: 0.3s;
  box-shadow: 0 0 12px rgba(255,0,0,0.6);
  opacity: 0;
  animation: slideUp 0.8s ease forwards;
  animation-delay: 0.9s;
}

.btn:hover {
  background: red;
  box-shadow: 0 0 30px red;
}

.btn:active {
  transform: scale(0.95);
}

/* ===== FIXED CONTACT ===== */
.contact-fixed {
  position: fixed;
  bottom: 25px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 9999;
}

.contact-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
  text-decoration: none;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
  50%  { box-shadow: 0 0 25px rgba(255,0,0,1); }
  100% { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
}

.zalo {
  background: #0068ff;
}

.phone {
  background: red;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  h1 {
    font-size: 42px;
    animation: zoomIn 1s ease forwards, glow 2s infinite alternate;
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.9);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }
}
</style>
</head>

<body>

<div class="overlay">
  <div class="content">
    <h1>THE WANN</h1>

    <div class="subtitle">
      NIGHTLIFE • MUSIC • EXPERIENCE
    </div>

    <div class="address">
      📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
    </div>

    <div class="buttons">
      <a class="btn" target="_blank"
         href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh">
        GOOGLE MAPS
      </a>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-fixed">
  <a href="https://zalo.me/0778307889" target="_blank"
     class="contact-btn zalo">💬</a>

  <a href="tel:0778307889"
     class="contact-btn phone">📞</a>
</div>

</body>
</html>
