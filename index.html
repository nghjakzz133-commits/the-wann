<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>THE WANN | Nightlife • Music • Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  overflow-x: hidden;
}

/* ===== TOP NAV ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
}

.nav-left {
  display: flex;
  gap: 26px;
}

.nav-left a {
  color: #ddd;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 1px;
  position: relative;
}

.nav-left a::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0;
  height: 2px;
  background: red;
  transition: 0.3s;
}

.nav-left a:hover::after {
  width: 100%;
}

.booking {
  border: 1px solid gold;
  padding: 8px 18px;
  color: gold;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 2px;
}

.booking:hover {
  background: gold;
  color: black;
}

/* ===== OVERLAY ===== */
.overlay {
  background: rgba(0,0,0,0.65);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* ===== CONTENT ===== */
.content {
  animation: fadeIn 1.2s ease forwards;
}

h1 {
  font-size: 64px;
  letter-spacing: 8px;
  text-shadow: 0 0 20px red, 0 0 50px red;
  animation: glow 2s infinite alternate;
}

.subtitle {
  margin-top: 14px;
  letter-spacing: 4px;
  color: #ddd;
  font-size: 14px;
}

.address {
  margin-top: 18px;
  font-size: 14px;
  opacity: 0.9;
}

/* ===== BUTTON ===== */
.buttons {
  margin-top: 28px;
}

.btn {
  padding: 12px 28px;
  border: 1px solid red;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  font-size: 13px;
  box-shadow: 0 0 14px rgba(255,0,0,0.6);
  transition: 0.3s;
}

.btn:hover {
  background: red;
  box-shadow: 0 0 35px red;
}

/* ===== CONTACT FIXED ===== */
.contact-fixed {
  position: fixed;
  bottom: 24px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  z-index: 9999;
}

.contact-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: white;
  text-decoration: none;
  animation: pulse 2s infinite;
}

.zalo {
  background: #0068ff;
}

.phone {
  background: red;
}

/* ===== ANIMATION ===== */
@keyframes glow {
  from { text-shadow: 0 0 12px red; }
  to   { text-shadow: 0 0 40px red; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes pulse {
  0%   { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
  50%  { box-shadow: 0 0 28px rgba(255,0,0,1); }
  100% { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .nav-left {
    display: none;
  }

  h1 {
    font-size: 42px;
  }

  .subtitle {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="nav-left">
    <a href="#">Trang Chủ</a>
    <a href="#">Giới Thiệu</a>
    <a href="#">Menu</a>
    <a href="#">Thư Viện</a>
    <a href="#">Tin Tức</a>
    <a href="#">Video</a>
    <a href="#">Liên Hệ</a>
  </div>
  <a class="booking" href="#">BOOKING</a>
</div>

<!-- HERO -->
<div class="overlay">
  <div class="content">
    <h1>THE WANN</h1>
    <div class="subtitle">NIGHTLIFE • MUSIC • EXPERIENCE</div>

    <div class="address">
      📍 51 Bùi Thị Xuân, Phường Phạm Ngũ Lão, Quận 1, TP. Hồ Chí Minh
    </div>

    <div class="buttons">
      <a class="btn" target="_blank"
         href="https://www.google.com/maps?q=51+Bui+Thi+Xuan+Quan+1+Ho+Chi+Minh">
        GOOGLE MAPS
      </a>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-fixed">
  <a href="https://zalo.me/0778307889" target="_blank"
     class="contact-btn zalo">💬</a>

  <a href="tel:0778307889"
     class="contact-btn phone">📞</a>
</div>

</body>
</html>
