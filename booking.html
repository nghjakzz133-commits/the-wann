<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BOOKING | THE WANN</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section dark">
  <h2>BOOKING & ĐẶT BÀN</h2>
  <p>Vui lòng điền thông tin để THE WANN liên hệ xác nhận.</p>

  <form class="booking-form"
  action="https://formsubmit.co/YOUR_EMAIL@gmail.com"
  method="POST">

  <input type="hidden" name="_subject" value="BOOKING THE WANN">
  <input type="hidden" name="_captcha" value="false">

  <input type="text" name="name" placeholder="Họ & Tên *" required>
  <input type="tel" name="phone" placeholder="Số điện thoại *" required>

  <input type="date" name="date" required>

  <select name="people" required>
    <option value="">Số lượng khách *</option>
    <option>1 – 2 khách</option>
    <option>3 – 5 khách</option>
    <option>6 – 10 khách</option>
    <option>10+ khách</option>
  </select>

  <textarea name="note" rows="4" placeholder="Ghi chú (sinh nhật, event, yêu cầu bàn VIP…)"></textarea>

  <button type="submit">GỬI YÊU CẦU BOOKING</button>
</form>
</section>

</body>
</html>
