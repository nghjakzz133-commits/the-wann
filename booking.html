<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOKING | THE WANN</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section dark booking-section">
  <h2>BOOKING & ĐẶT BÀN</h2>
  <p class="booking-sub">Exclusive table reservation – Priority confirmation</p>
  <p class="booking-desc-top">Vui lòng điền thông tin để THE WANN liên hệ xác nhận.</p>

  <form class="booking-form" method="POST">
    <input type="text" name="name" placeholder="Họ & Tên *" required>
    <input type="tel" name="phone" placeholder="Số điện thoại *" required>
    <input type="date" name="date" required>

    <select name="people" required>
      <option value="">Số lượng khách *</option>
      <option>1 – 2 khách</option>
      <option>3 – 5 khách</option>
      <option>6 – 10 khách</option>
      <option>10+ khách</option>
    </select>

    <textarea name="note" placeholder="Ghi chú (sinh nhật, event, yêu cầu bàn VIP…)"></textarea>

    <button type="submit">GỬI YÊU CẦU BOOKING</button>
    <p class="booking-note">THE WANN sẽ liên hệ xác nhận trong ít phút</p>
  </form>
</section>

<section class="booking-intro">
  <img src="assets/logo.png" class="booking-logo" alt="THE WANN">
  <p class="booking-desc">
    THE WANN – Luxury Night Club tại trung tâm Quận 1.<br>
    Không gian VIP, âm nhạc đỉnh cao, dịch vụ đẳng cấp.
  </p>
</section>

</body>
</html>
